name: live-state-write-blob-manual

# Phase 1.28M - MANUAL-ONLY writer: sanitized PublicSafeLiveState -> PRIVATE Vercel Blob.
# Runs `npm run live:state:write-blob` on manual dispatch ONLY. It NEVER runs on
# schedule/push/pull_request, commits nothing, uploads no artifacts, and prints only the
# script's redacted output. Tokens are passed solely as step-level env vars and are never
# echoed, logged, or written. Default source is the manual/FIFA fixture (no provider data).
on:
  workflow_dispatch:
    inputs:
      source:
        description: "fixture (manual/FIFA snapshot) or football-data (provider-derived, stays PRIVATE)"
        type: choice
        options:
          - fixture
          - football-data
        default: fixture
      object_path:
        description: Private Blob object path
        type: string
        default: live-state.sanitized.json
      dry_run:
        description: Validate + gate only; do not write to Blob
        type: boolean
        default: false
      allow_partial:
        description: "football-data mode: skip the full 104-match assertion"
        type: boolean
        default: false
      refresh_forecast:
        description: "Also refresh forecast-current + forecast-matches (production objects only)"
        type: boolean
        default: false
      include_retrospective:
        description: "forecast-matches: also emit retrospective model forecasts (opt-in)"
        type: boolean
        default: false
      forecast_force:
        description: "Force a forecast rewrite even when inputs are unchanged"
        type: boolean
        default: false

# Read-only: this workflow must never write to the repo, packages, or deployments.
permissions:
  contents: read

# Serialize writes to the single Blob object; do not cancel an in-flight write.
concurrency:
  group: live-state-write-blob-manual
  cancel-in-progress: false

jobs:
  write-blob:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write sanitized public-safe live-state to private Blob
        # Tokens are provided ONLY here, as env vars. They are never echoed or written.
        # Missing required secret -> the script fails safe (exit 1, no write).
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SOURCE: ${{ inputs.source }}
          OBJECT_PATH: ${{ inputs.object_path }}
          DRY_RUN: ${{ inputs.dry_run }}
          ALLOW_PARTIAL: ${{ inputs.allow_partial }}
        run: |
          flags="--source $SOURCE --object-path $OBJECT_PATH"
          if [ "$DRY_RUN" = "true" ]; then
            flags="$flags --dry-run"
          fi
          if [ "$ALLOW_PARTIAL" = "true" ]; then
            flags="$flags --allow-partial"
          fi
          echo "Running: npm run live:state:write-blob -- $flags"
          npm run live:state:write-blob -- $flags

      # Opt-in forecast refresh (default OFF). Reads the PUBLIC-SAFE live-state Blob, never
      # football-data; needs ONLY the Blob token. A real refresh may ONLY read the production
      # provider live-state object and may ONLY write the production forecast objects — it is
      # refused otherwise so a fixture/default manual write can never clobber prod forecasts.
      - name: Refresh + smoke-check forecast objects (opt-in)
        if: ${{ inputs.refresh_forecast }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SOURCE: ${{ inputs.source }}
          OBJECT_PATH: ${{ inputs.object_path }}
          DRY_RUN: ${{ inputs.dry_run }}
          INCLUDE_RETROSPECTIVE: ${{ inputs.include_retrospective }}
          FORECAST_FORCE: ${{ inputs.forecast_force }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "dry_run=true: SKIPPING forecast refresh (forecast objects are NOT written on a dry run)."
            echo "Preview forecasts locally with the safe dry-run commands in docs/FORECAST_REFRESH_RUNBOOK.md."
            exit 0
          fi
          # Safety gate: a real forecast refresh may ONLY read the production provider
          # live-state object. Refuse to overwrite production forecast objects from a
          # fixture/default live-state object.
          if [ "$SOURCE" != "football-data" ] || [ "$OBJECT_PATH" != "live-state.provider.sanitized.json" ]; then
            echo "BLOCKED: refresh_forecast=true requires source=football-data and object_path=live-state.provider.sanitized.json."
            echo "  got: source=$SOURCE object_path=$OBJECT_PATH"
            echo "This prevents overwriting production forecast objects from a fixture/default live-state object."
            exit 1
          fi
          current_flags="--source blob --live-state-object-path $OBJECT_PATH --forecast-object-path forecast-current.provider.sanitized.json"
          matches_flags="--source blob --live-state-object-path $OBJECT_PATH --matches-object-path forecast-matches.provider.sanitized.json --forecast-current-object-path forecast-current.provider.sanitized.json"
          if [ "$FORECAST_FORCE" = "true" ]; then
            current_flags="$current_flags --force"
            matches_flags="$matches_flags --force"
          fi
          if [ "$INCLUDE_RETROSPECTIVE" = "true" ]; then
            matches_flags="$matches_flags --include-retrospective"
          fi
          echo "Running: npm run forecast:refresh:current -- $current_flags"
          npm run forecast:refresh:current -- $current_flags
          echo "Running: npm run forecast:refresh:matches -- $matches_flags"
          npm run forecast:refresh:matches -- $matches_flags
          echo "Running: npm run forecast:smoke -- --source blob --strict"
          npm run forecast:smoke -- --source blob --strict --current-object-path forecast-current.provider.sanitized.json --matches-object-path forecast-matches.provider.sanitized.json
